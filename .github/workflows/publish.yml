name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run integration tests before publishing
  integration-tests:
    uses: ./.github/workflows/integration.yml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-memori-wheels:
    needs: integration-tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build memori wheel (macOS)
        if: runner.os == 'macOS'
        env:
          PYO3_PYTHON: python
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          RUSTFLAGS: -C link-arg=-undefined -C link-arg=dynamic_lookup
        run: python -m build --wheel --outdir dist

      - name: Build memori wheel (non-macOS)
        if: runner.os != 'macOS'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: python -m build --wheel --outdir dist

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv .wheel-smoke
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./.wheel-smoke/Scripts/python -m pip install --upgrade pip
            ./.wheel-smoke/Scripts/python -m pip install dist/*.whl
            ./.wheel-smoke/Scripts/python -c "import memori, memori_python; print(memori.__version__)"
          else
            ./.wheel-smoke/bin/python -m pip install --upgrade pip
            ./.wheel-smoke/bin/python -m pip install dist/*.whl
            ./.wheel-smoke/bin/python -c "import memori, memori_python; print(memori.__version__)"
          fi

      - name: Upload memori wheel
        uses: actions/upload-artifact@v4
        with:
          name: memori-wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  build-memori-sdist:
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build memori source distribution
        run: python -m build --sdist --outdir dist

      - name: Upload memori sdist
        uses: actions/upload-artifact@v4
        with:
          name: memori-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-memori:
    needs: [build-memori-wheels, build-memori-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download memori distributions
        uses: actions/download-artifact@v4
        with:
          pattern: memori-*
          path: dist/memori
          merge-multiple: true

      - name: Verify memori distribution
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/memori/*

      - name: Publish memori to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/memori/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  deploy:
    needs: [integration-tests, publish-memori]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install build tools
        run: pip install --upgrade pip build twine toml

      - name: Update package name to memorisdk
        run: |
          python -c "
            import toml
            with open('pyproject.toml', 'r') as f:
                config = toml.load(f)
            config['project']['name'] = 'memorisdk'
            with open('pyproject.toml', 'w') as f:
                toml.dump(config, f)
          "

      - name: Build memorisdk package
        run: python -m build --outdir dist/memorisdk

      - name: Verify memorisdk distribution
        run: twine check dist/memorisdk/*

      - name: Publish memorisdk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/memorisdk/
          user: __token__
          password: ${{ secrets.PYPI_SDK_API_TOKEN }}

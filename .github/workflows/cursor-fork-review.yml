name: Cursor Fork PR Review

# pull_request_target is required so fork PRs can use repository secrets
# (CURSOR_API_KEY). This workflow runs only when a maintainer adds the
# "automated review" label to a fork PR.
#
# Security model:
# - prepare-context: read-only GitHub API fetch pinned to the labeled head SHA;
#   no repo checkout of fork code
# - generate-review: trusted broker script calls Cursor Cloud Agents API;
#   CURSOR_API_KEY never enters a local autonomous agent shell
# - publish-review: write-scoped token only; posts a validated JSON artifact
on:
  pull_request_target:
    types: [labeled]

permissions: {}

concurrency:
  group: cursor-fork-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare-context:
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'automated review' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Fetch PR review context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          assert_head_unchanged() {
            current_head="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid -q .headRefOid)"
            if [ "$current_head" != "$PR_HEAD_SHA" ]; then
              echo "PR head moved from labeled commit ${PR_HEAD_SHA} to ${current_head}; aborting."
              exit 1
            fi
          }

          mkdir -p review-context
          assert_head_unchanged

          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json title,body,author,comments,baseRefName,headRefOid,url \
            > review-context/pr-metadata.json

          metadata_head="$(jq -r '.headRefOid' review-context/pr-metadata.json)"
          if [ "$metadata_head" != "$PR_HEAD_SHA" ]; then
            echo "PR metadata headRefOid ${metadata_head} does not match labeled ${PR_HEAD_SHA}; aborting."
            exit 1
          fi

          gh api "repos/${REPO}/compare/${PR_BASE_SHA}...${PR_HEAD_SHA}" \
            > review-context/compare.json

          jq '.files' review-context/compare.json > review-context/files.json
          jq -e 'type == "array"' review-context/files.json >/dev/null

          jq -r '.files[] | select(.patch != null) | "diff --git a/\(.filename) b/\(.filename)\n\(.patch)\n"' \
            review-context/compare.json > review-context/diff.patch

          for path in CONTRIBUTING.md .github/pull_request_template.md; do
            encoded_path="${path//\//%2F}"
            if gh api "repos/${REPO}/contents/${encoded_path}?ref=main" \
              --jq -r '.content' > /tmp/content.b64 2>/dev/null; then
              base64 -d /tmp/content.b64 > "review-context/$(basename "$path")"
            fi
          done

          assert_head_unchanged

      - name: Upload review context
        uses: actions/upload-artifact@v4
        with:
          name: review-context
          path: review-context/
          retention-days: 1

  generate-review:
    needs: prepare-context
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout trusted broker script
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Download review context
        uses: actions/download-artifact@v4
        with:
          name: review-context
          path: review-context

      - name: Generate review output
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MODEL: ${{ vars.CURSOR_REVIEW_MODEL || 'gpt-5.5-high' }}
        run: python3 .github/scripts/generate-fork-review.py review-context

      - name: Upload review output
        uses: actions/upload-artifact@v4
        with:
          name: review-output
          path: review-output.json
          retention-days: 1

  publish-review:
    needs: generate-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Download review output
        uses: actions/download-artifact@v4
        with:
          name: review-output
          path: .

      - name: Publish pull request review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          artifact_head="$(jq -r '.commit_id' review-output.json)"
          if [ -z "$artifact_head" ] || [ "$artifact_head" = "null" ]; then
            echo "Review artifact is missing commit_id; aborting."
            exit 1
          fi
          if [ "$artifact_head" != "$PR_HEAD_SHA" ]; then
            echo "Review artifact commit_id ${artifact_head} does not match labeled ${PR_HEAD_SHA}; aborting."
            exit 1
          fi

          current_head="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid -q .headRefOid)"
          if [ "$current_head" != "$PR_HEAD_SHA" ]; then
            echo "PR head moved from labeled commit ${PR_HEAD_SHA} to ${current_head}; aborting publish."
            exit 1
          fi

          prior_count="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate --slurp \
            --jq "[.[][] | select(.user.login == \"github-actions[bot]\" and .commit_id == \"${PR_HEAD_SHA}\")] | length")"
          if [ "$prior_count" -gt 0 ]; then
            echo "Automated review already posted for ${PR_HEAD_SHA}; skipping."
            exit 0
          fi

          comment_count="$(jq '.comments | length' review-output.json)"
          if [ "$comment_count" -eq 0 ]; then
            jq --arg commit_id "$PR_HEAD_SHA" \
              '{event: "COMMENT", commit_id: $commit_id, body: .summary}' review-output.json | \
              gh api --method POST "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --input -
          else
            jq --arg commit_id "$PR_HEAD_SHA" \
              '{event: "COMMENT", commit_id: $commit_id, body: .summary, comments: .comments}' review-output.json | \
              gh api --method POST "repos/${REPO}/pulls/${PR_NUMBER}/reviews" --input -
          fi
